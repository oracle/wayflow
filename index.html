<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting…</title>
    <meta http-equiv="refresh" content="0; url=26.1.1/">
    <link rel="canonical" href="26.1.1/">
</head>
<body>
    <p>If you are not redirected automatically, <a href="26.1.1/">click here</a>.</p>
    <script>
        fetch("switcher.json")
          .then(response => response.json())
          .then(versions => {
            const stable = versions.find(v => v.version !== "dev");
            window.location.replace(stable ? stable.url : "development/");
          })
          .catch(() => {
            window.location.replace("26.1.1/");
          });
    </script>
</body>
</html>
